<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>florentiu.me</title>
    <style>
        :root {
            --bg: #ffffff;
            --panel: #ffffff;
            --ink: #111111;
            --muted: #555555;
            --line: #111111;
            --accent: #1a4dff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--ink);
            background: var(--bg);
            padding: 2rem;
        }

        .card {
            background: var(--panel);
            border: 2px solid var(--line);
            box-shadow: 12px 12px 0 var(--line);
            max-width: 560px;
            width: 100%;
        }

        .card__header {
            border-bottom: 2px solid var(--line);
            padding: 0.9rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .card__header .dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border: 2px solid var(--line);
        }

        .card__body {
            padding: 3rem 2.5rem;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--panel);
            background: var(--ink);
            padding: 0.35rem 0.8rem;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.05;
            letter-spacing: -0.02em;
            margin-bottom: 1.25rem;
            text-transform: uppercase;
        }

        p.lead {
            font-size: 1.1rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 42ch;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: var(--panel);
            background: var(--ink);
            padding: 0.9rem 2rem;
            border: 2px solid var(--line);
        }

        .btn:hover {
            background: var(--accent);
            color: var(--panel);
        }

        .card__footer {
            border-top: 2px solid var(--line);
            padding: 0.9rem 1.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="card__header">
            <span>florentiu.me</span>
        </div>
        <div class="card__body">
            <span class="badge">Bun venit</span>
            <h1>Salut, sunt Florentiu.</h1>
            <p class="lead">O pagină de bun venit simplă și solidă — construită cu HTML și CSS, fără biblioteci externe.</p>
            <a class="btn" href="#">Află mai multe</a>
        </div>
        <div class="card__footer">
            <span>© 2026 Florentiu Mihai</span>
            <span>RO</span>
        </div>
    </main>
</body>
</html>
