<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prima pagină web</title>
    <style>
        :root {
            --bg-1: #6366f1;
            --bg-2: #8b5cf6;
            --bg-3: #ec4899;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1e293b;
            --muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            padding: 1.5rem;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 3.5rem 3rem;
            max-width: 560px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
            animation: fadeUp 0.8s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--bg-2);
            background: rgba(139, 92, 246, 0.12);
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 2.8rem);
            line-height: 1.15;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-3));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.lead {
            font-size: 1.15rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            padding: 0.85rem 2rem;
            border-radius: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.6);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 28px -6px rgba(99, 102, 241, 0.7);
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main class="card">
        <span class="badge">Bun venit</span>
        <h1>Prima mea pagină web</h1>
        <p class="lead">O pagină simplă, modernă și plăcută la privit — construită cu HTML și CSS, fără biblioteci externe.</p>
        <a class="btn" href="#">Află mai multe</a>
        <footer>Făcută cu ♥ &middot; 2026</footer>
    </main>
</body>
</html>
